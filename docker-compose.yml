services:
  ola:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "9090:9090"   # web UI
      - "9010:9010"   # olad RPC
      # - "7770:7770/udp"   # OSC plugin (if enabled)
      # - "5568:5568/udp"   # E1.31 / sACN (if enabled)
    volumes:
      - ola-config:/etc/ola
    # USB DMX interfaces: uncomment the block that matches your device.
    #
    # Option A — pass through all USB devices (broadest; requires privileged):
    # privileged: true
    #
    # Option B — pass through a specific USB serial adapter:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #
    # Option C — pass through the full USB bus (no privileged required):
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb

volumes:
  ola-config:
