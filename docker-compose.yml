services:
  ola:
    build:
      context: docker/ola
      dockerfile: Dockerfile
    platform: linux/arm64
    restart: unless-stopped
    # Host networking gives olad's RPC server (127.0.0.1:9010) access on the Pi's
    # own loopback, so SSH tunnelling from a dev machine works. Without this,
    # docker-proxy connects to the container's eth0 IP, which olad never binds.
    network_mode: host
    volumes:
      - ola-config:/etc/ola
    # ENTTEC Open DMX USB (FTDI 0403:6001) is claimed as a raw USB device via
    # libusb by the ftdidmx plugin. olad runs unprivileged, so the device must be
    # accessible to non-root: install the udev rule via tools/deploy-pi.sh on the
    # Pi (sets the FTDI node to mode 0666), then this passes the USB bus through.
    devices:
      - /dev/bus/usb:/dev/bus/usb

volumes:
  ola-config:
