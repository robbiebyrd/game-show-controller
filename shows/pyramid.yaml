                  button_2:
                    type: sound
                    label: "Item!"
                    path: "music/Pyramid_Item_Correct.mp3"
                  button_3:
                    type: sound
                    label: "Cuckoo"
                    path: "music/Pyramid_Cuckoo.mp3"
                    color: "#440000"
                  button_4:
                    type: sound
                    label: "Score"
                    path: "music/Pyramid_Subject_Score.mp3"
                  button_5:
                    type: sound
                    label: "Circle Win"
                    path: "music/Pyramid_Circle_Correct.mp3"
                    color: "#004422"
                  button_6:
                    type: sound
                    label: "Reveal"
                    path: "music/Pyramid_Winner_Reveal.mp3"
                  button_7:
                    type: stop_sounds
                    label: "Stop All"
                    color: "#552222"
            button_13:
              type: state_display
