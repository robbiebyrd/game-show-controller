service:
  osc_server_host: "0.0.0.0"
  osc_server_port: 21601
  dmx_osc_host: "localhost"
  dmx_osc_port: 21600
  obs_host: "localhost"
  obs_port: 4455
  obs_password: ""
  touchosc_host: "127.0.0.1"
  touchosc_port: 9000

buzzers:
  buzz_timeout_seconds: 5
  players:
    - id: 1
      name: "Player 1"
      key: "1"
      enabled: true
    - id: 2
      name: "Player 2"
      key: "2"
      enabled: true
    - id: 3
      name: "Player 3"
      key: "3"
      enabled: false
    - id: 4
      name: "Player 4"
      key: "4"
      enabled: false

state_machine:
  return_to_after_correct: idle
  return_to_after_incorrect: idle
  return_to_after_round_start: idle
  correct_hold_seconds: 2.0
  incorrect_hold_seconds: 2.0
  buzz_timeout_hold_seconds: 0.5
  round_start_hold_seconds: 2.0

lighting:
  states:
    idle:          "/live/Control_Panel/cue/Game/activate"
    player_1_buzz: "/live/Control_Panel/cue/Buzz_Left/activate"
    player_2_buzz: "/live/Control_Panel/cue/Buzz_Right/activate"
    player_3_buzz: "/live/Control_Panel/cue/BLACK/activate"
    player_4_buzz: "/live/Control_Panel/cue/BLACK/activate"
    locked:        "/"
    correct:       "/live/Control_Panel/cue/Correct/activate"
    incorrect:     "/live/Control_Panel/cue/Incorrect/activate"
    allow_next:    "/live/*/cue/*/deactivate 0"
    buzz_timeout:  "/live/Control_Panel/cue/Buzzer_Timeout/activate"
    timed_lockout: "/live/Control_Panel/cue/Buzzer_Timeout/activate"
    round_start:   "/live/Control_Panel/cue/Yellow_Buzz/activate"
    game_over:     "/live/Control_Panel/cue/Sparkle/activate"
    clear:         "/live/*/cue/*/deactivate 0"

audio:
  default_background_volume: 0.7
  default_effect_volume: 1.0
  states:
    player_1_buzz:
      effect: "music/Game Inventory Slot 2.mp3"
    player_2_buzz:
      effect: "music/Game Checkpoint Sound 1.mp3"
    correct:
      effect: "music/Game Achievement Sound 1.mp3"
    incorrect:
      effect: "music/Game Error 2.mp3"
    buzz_timeout:
      effect: "music/Game Block Destruction 2.mp3"
    round_start:
      background: "music/Game Score Count 2.mp3"
    game_over:
      background: "music/Mission Failed Sound Effect 2.mp3"

obs:
  states:
    idle:          "Idle"
    locked:        "Buzz_Locked"
    correct:       "Correct"
    incorrect:     "Incorrect"
    allow_next:    "Allow_Next"
    buzz_timeout:  "Buzz_Timeout"
    timed_lockout: "Timed_Lockout"
    round_start:   "Round_Start"
    game_over:     "Game_Over"

show:
  scenes:
    - name: "Intro"
      on_enter:
        audio_background: "music/Game Reveal Sound 2.mp3"
        obs_scene: "Intro_Screen"
        lighting: "/palette/Intro/activate"
      buzzers:
        all_enabled: false
    - name: "Face Off"
      on_enter:
        obs_scene: "FaceOff_Ready"
        lighting: "/palette/FaceOff/activate"
      buzzers:
        buzz_timeout_seconds: null
      lighting:
        states:
          locked: "/palette/FaceOff_Buzz/start"
      obs:
        states:
          locked: "FaceOff_Buzz"
          correct: "FaceOff_Correct"
    - name: "Round 1"
      on_enter:
        audio_background: "music/Game Level Up 1.mp3"
        obs_scene: "Round1_Board"
      state_machine:
        return_to_after_incorrect: allow_next
      buzzers:
        buzz_timeout_seconds: 8.0

control_surface:
  enabled: true
  brightness: 100
  label_align: center      # top | center | bottom  (per-button `label_align:` overrides)
  label_wrap: true         # word-wrap long labels   (per-button `label_wrap:` overrides)
  # font_path: "fonts/CalSans-Regular.ttf"
  fa_path: "node_modules/@fortawesome/fontawesome-pro"  # webfonts/ + metadata/ fetched via `mise run install`
  fa_type: pro             # default icon family: pro|brands|duotone|sharp|sharp-duotone
  fa_weight: solid         # default icon weight: solid|regular|light|thin
  root:
    buttons:
      button_0:
        type: reset_buzzer
        label: "Reset"
        color: "#552222"
      button_1:
        type: buzz
        label: "P1"
        player_id: 1
        label_align: "center"
        label_wrap: false
        label_marquee: false
        font_size: 28
      button_2:
        type: buzz
        label: "P2"
        player_id: 2
        label_align: "center"
        label_wrap: true
        font_size: 28
      button_3:
        type: buzz
        label: "P3"
        player_id: 3
        label_align: "center"
        label_wrap: true
        font_size: 28
      button_4:
        type: buzz
        label: "P4"
        player_id: 4
        label_align: "center"
        label_wrap: true
        font_size: 28
      button_5:
        type: state
        fa_icon: "check"        # Font Awesome icon by name
        state: correct
        color: "#009900"
        fa_size: 40
        fa_color: "#FFFFFF"
        pressed:                # <- applied only while held
          color: "#AA00AA"      # green while pressed
          fa_color: "#000000"
      button_6:
        type: state
        fa_icon: "xmark"
        state: incorrect
        color: "#FF0000"
        fa_size: 44
        fa_color: "#FFFFFF"
      button_7:
        type: state
        label: "Allow Next"
        state: allow_next
        text_wrap: true
        font_size: 20
        color: "#FFFF00"
        text_color: "#000000"
      button_8:
        type: countdown
        action: display
        label: "Timer"
      button_9:
        type: state_display
        label: "State"
      button_10:
        type: scene_previous
        fa_icon: "caret-large-left"
        font_size: 56
      button_11:
        type: scene_current
        label: "Scene"
      button_12:
        type: scene_advance
        fa_icon: "caret-large-right"
        font_size: 56
      button_13:
        type: page
        fa_icon: "album-collection"
        label: "Sounds"
        color: "#333355"
        page:
          buttons:
            button_0:
              type: sound
              label: "Applause"
              path: "music/Game Achievement Sound 1.mp3"
            button_1:
              type: sound
              label: "Buzzer"
              path: "music/Game Error 2.mp3"
            button_2:
              type: sound
              label: "Reveal"
              path: "music/Game Reveal Sound 2.mp3"
            button_3:
              type: stop_sounds
              label: "Stop All"
              color: "#552222"
      button_14:
        type: page
        label: "More"
        color: "#333355"
        page:
          buttons:
            button_0:
              type: lighting
              label: "Lights"
              osc: "/live/Control_Panel/cue/Game/activate"
            button_1:
              type: state
              label: "Lockout 5s"
              state: timed_lockout
              duration: 5.0
            button_2:
              type: state
              label: "Round Start"
              state: round_start
            button_3:
              type: state
              label: "Game Over"
              state: game_over
              color: "#552222"
            button_4:
              type: scene_goto
              label: "Face Off"
              target: "Face Off"
            button_5:
              type: page
              label: "Timer"
              page:
                buttons:
                  button_0:
                    type: countdown
                    action: display
                    label: "Timer"
                  button_1:
                    type: countdown
                    action: pause
                    label: "Pause"
                  button_2:
                    type: countdown
                    action: resume
                    label: "Resume"
                  button_3:
                    type: countdown
                    action: reset
                    label: "Reset"
                  button_4:
                    type: countdown
                    action: cancel
                    label: "Cancel"
            button_6:
              type: page
              label: "OBS"
              page:
                buttons:
                  button_0:
                    type: obs_scene
                    label: "Intro"
                    scene: "Intro_Screen"
                  button_1:
                    type: obs_scene
                    label: "Board"
                    scene: "Round1_Board"
                  button_2:
                    type: obs_request
                    label: "Mute Mic"
                    request_type: "SetInputMute"
                    request_data: { inputName: "Mic", inputMuted: true }
