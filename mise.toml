[tools]
python = "3.11"
poetry = "latest"
node = "lts"

[env]
_.python.venv = { path = ".venv", create = true }
# Loads FONTAWESOME_PACKAGE_TOKEN (and any other secrets) for npm + the app.
_.file = ".env"

[tasks.install]
description = "Install Python deps (Poetry) and Font Awesome Pro fonts (npm)"
run = [
  "poetry install",
  "npm install",
]

[tasks.test]
description = "Run the test suite"
run = "poetry run pytest"
