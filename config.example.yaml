service:
  osc_server_host: "0.0.0.0"
  osc_server_port: 21601
  dmx_osc_host: "localhost"
  dmx_osc_port: 21600
  obs_host: "localhost"
  obs_port: 4455
  obs_password: ""
  touchosc_host: "127.0.0.1"
  touchosc_port: 9000

buzzers:
  buzz_timeout_seconds: 5
  players:
    - id: 1
      name: "Player 1"
      key: "1"
      enabled: true
    - id: 2
      name: "Player 2"
      key: "2"
      enabled: true
    - id: 3
      name: "Player 3"
      key: "3"
      enabled: false
    - id: 4
      name: "Player 4"
      key: "4"
      enabled: false

# The game flow is a fully data-driven state machine. `initial` is the starting
# state; `states` defines every state and its transitions; `global` lists
# triggers that work from any state.
#
# A trigger fires when a matching ControlCommand (or the `buzz` trigger, from a
# buzzer press) arrives. Its value is either a target-state name, or a mapping:
#   { to: <state>, do: [<behavior>...], when_all_banned: <state> }
# Behaviors (run in order): ban_current | clear_bans | clear_player | countdown.
#   - ban_current  : ban the currently locked-in player
#   - clear_bans   : lift all bans
#   - clear_player : forget the locked-in player
#   - countdown    : (entry behavior) start the buzz-timeout countdown
# `when_all_banned` redirects (and clears bans) once every enabled player is
# banned. `hold`/`then` auto-advance after N seconds; `hold_from_arg` takes the
# hold from the command argument (e.g. timed_lockout duration).
#
# NOTE: the transition-table key is `transitions`, NOT `on` — YAML would coerce
# an unquoted `on:` key to the boolean true.
state_machine:
  initial: idle
  global:
    clear:         { to: idle,      do: [clear_bans, clear_player] }
    game_over:     { to: game_over, do: [clear_bans, clear_player] }
    round_start:   round_start
    timed_lockout: timed_lockout          # duration taken from the command argument
  states:
    idle:
      transitions: { buzz: locked }       # a buzzer press locks that player
    locked:
      behaviors: [countdown]              # start the buzz-timeout countdown on entry
      transitions:
        countdown_expire: buzz_timeout    # fired when the countdown runs out
        correct: correct
        incorrect: { to: incorrect, do: [ban_current] }
        allow_next:
          to: allow_next
          do: [ban_current, clear_player]
          when_all_banned: idle           # everyone banned → clear bans and reset
    correct:       { hold: 2.0, then: idle }
    incorrect:     { hold: 2.0, then: idle, transitions: { buzz: locked } }
    allow_next:    { transitions: { buzz: locked } }
    buzz_timeout:
      hold: 0.5
      then: { to: allow_next, do: [ban_current, clear_player], when_all_banned: idle }
    timed_lockout: { hold_from_arg: 5.0, then: idle }
    round_start:   { hold: 2.0, then: idle }
    game_over:     {}

lighting:
  states:
    idle:          "/live/Control_Panel/cue/Game/activate"
    player_1_buzz: "/live/Control_Panel/cue/Buzz_Left/activate"
    player_2_buzz: "/live/Control_Panel/cue/Buzz_Right/activate"
    player_3_buzz: "/live/Control_Panel/cue/BLACK/activate"
    player_4_buzz: "/live/Control_Panel/cue/BLACK/activate"
    locked:        "/"
    correct:       "/live/Control_Panel/cue/Correct/activate"
    incorrect:     "/live/Control_Panel/cue/Incorrect/activate"
    allow_next:    "/live/*/cue/*/deactivate 0"
    buzz_timeout:  "/live/Control_Panel/cue/Buzzer_Timeout/activate"
    timed_lockout: "/live/Control_Panel/cue/Buzzer_Timeout/activate"
    round_start:   "/live/Control_Panel/cue/Yellow_Buzz/activate"
    game_over:     "/live/Control_Panel/cue/Game/activate"
    clear:         "/live/*/cue/*/deactivate 0"

audio:
  default_background_volume: 0.7
  default_effect_volume: 1.0
  states:
    player_1_buzz:
      effect: "music/Game Inventory Slot 2.mp3"
    player_2_buzz:
      effect: "music/Game Checkpoint Sound 1.mp3"
    correct:
      effect: "music/Game Achievement Sound 1.mp3"
    incorrect:
      effect: "music/Game Error 2.mp3"
    buzz_timeout:
      effect: "music/Game Block Destruction 2.mp3"
    round_start:
      background: "music/Game Score Count 2.mp3"
    game_over:
      background: "music/Mission Failed Sound Effect 2.mp3"

obs:
  states:
    idle:          "Idle"
    locked:        "Buzz_Locked"
    correct:       "Correct"
    incorrect:     "Incorrect"
    allow_next:    "Allow_Next"
    buzz_timeout:  "Buzz_Timeout"
    timed_lockout: "Timed_Lockout"
    round_start:   "Round_Start"
    game_over:     "Game_Over"

show:
  scenes:
    - name: "Intro"
      on_enter:
        audio_background: "music/Game Reveal Sound 2.mp3"
        obs_scene: "Intro_Screen"
        lighting: "/palette/Intro/activate"
      buzzers:
        all_enabled: false
    - name: "Face Off"
      on_enter:
        obs_scene: "FaceOff_Ready"
        lighting: "/palette/FaceOff/activate"
      buzzers:
        buzz_timeout_seconds: null
      lighting:
        states:
          locked: "/palette/FaceOff_Buzz/start"
      obs:
        states:
          locked: "FaceOff_Buzz"
          correct: "FaceOff_Correct"
    - name: "Round 1"
      on_enter:
        audio_background: "music/Game Level Up 1.mp3"
        obs_scene: "Round1_Board"
      state_machine:                    # scene overrides deep-merge into the base
        states:
          incorrect:
            then: allow_next            # this round: a wrong answer opens the buzzers
      buzzers:
        buzz_timeout_seconds: 8.0

# Elgato Stream Deck MK.2 (15 keys, 3x5). Keys are 0-indexed, left-to-right,
# top-to-bottom (key 0 = top-left, key 10 = bottom-left). On any sub-page,
# key 10 is automatically a "return to previous page" button. Buttons without
# an explicit `key` are auto-placed left-to-right into the remaining slots.
#
# Button types: reset_buzzer, buzz, state (clear|round_start|game_over|correct|
# incorrect|allow_next|timed_lockout), countdown (action: display|toggle|pause|
# resume|reset|cancel), scene_advance, scene_previous, scene_goto, scene_current,
# state_display, lighting, sound, stop_sounds, obs_scene, obs_request, page.
control_surface:
  enabled: true
  brightness: 60
  # serial: "AL1234"                          # optional: pick a deck by serial
  # font_path: "assets/Roboto-Regular.ttf"    # optional TTF for labels
  # Font Awesome Pro icons (fetched via `mise run install`; see docs/control_surface.md):
  # fa_path: "node_modules/@fortawesome/fontawesome-pro"  # dir with webfonts/ + metadata/
  # fa_type: pro                               # pro|brands|duotone|sharp|sharp-duotone
  # fa_weight: solid                           # solid|regular|light|thin
  root:
    buttons:
      # Row 0 — buzzers + reset
      button_0:
        type: reset_buzzer
        label: "Reset"
        key: 0
        color: "#552222"
      button_1:
        type: buzz
        label: "P1"
        player_id: 1
        key: 1
        # Light the key green and swap the label while it's held down; it
        # reverts to the values above the instant the key is released.
        pressed:
          color: "#00AA00"
          label: "IN!"
          text_color: "#000000"
      button_2:
        type: buzz
        label: "P2"
        player_id: 2
        key: 2
      button_3:
        type: buzz
        label: "P3"
        player_id: 3
        key: 3
      button_4:
        type: buzz
        label: "P4"
        player_id: 4
        key: 4
      # Row 1 — adjudication + live readouts
      button_5:
        type: state
        label: "Correct"
        state: correct
        key: 5
        color: "#224422"
      button_6:
        type: state
        label: "Wrong"
        state: incorrect
        key: 6
        color: "#442222"
      button_7:
        type: state
        label: "Next"
        state: allow_next
        key: 7
      button_8:
        type: countdown
        action: display
        label: "Timer"
        key: 8
      button_9:
        type: state_display
        label: "State"
        key: 9
      # Row 2 — scene path + folders (key 10 free on the root page)
      button_10:
        type: scene_previous
        label: "◀ Prev"
        key: 10
      button_11:
        type: scene_current
        label: "Scene"
        key: 11
      button_12:
        type: scene_advance
        label: "Next ▶"
        key: 12
      button_13:
        type: page
        label: "Audio"
        key: 13
        color: "#333355"
        page:
          buttons:
            applause:
              type: sound
              label: "Applause"
              path: "music/Game Achievement Sound 1.mp3"
            buzzer:
              type: sound
              label: "Buzzer"
              path: "music/Game Error 2.mp3"
            reveal:
              type: sound
              label: "Reveal"
              path: "music/Game Reveal Sound 2.mp3"
            stop_all:
              type: stop_sounds
              label: "Stop All"
              color: "#552222"
      button_14:
        type: page
        label: "More"
        key: 14
        color: "#333355"
        page:
          buttons:
            lights:
              type: lighting
              label: "Lights"
              osc: "/live/Control_Panel/cue/Game/activate"
            lockout:
              type: state
              label: "Lockout 5s"
              state: timed_lockout
              duration: 5.0
            round_start:
              type: state
              label: "Round Start"
              state: round_start
            game_over:
              type: state
              label: "Game Over"
              state: game_over
              color: "#552222"
            face_off:
              type: scene_goto
              label: "Face Off"
              target: "Face Off"
            timer_folder:
              type: page
              label: "Timer"
              page:
                buttons:
                  timer_display:
                    type: countdown
                    action: display
                    label: "Timer"
                  timer_pause:
                    type: countdown
                    action: pause
                    label: "Pause"
                  timer_resume:
                    type: countdown
                    action: resume
                    label: "Resume"
                  timer_reset:
                    type: countdown
                    action: reset
                    label: "Reset"
                  timer_cancel:
                    type: countdown
                    action: cancel
                    label: "Cancel"
            obs_folder:
              type: page
              label: "OBS"
              page:
                buttons:
                  obs_intro:
                    type: obs_scene
                    label: "Intro"
                    scene: "Intro_Screen"
                  obs_board:
                    type: obs_scene
                    label: "Board"
                    scene: "Round1_Board"
                  obs_mute:
                    type: obs_request
                    label: "Mute Mic"
                    request_type: "SetInputMute"
                    request_data: { inputName: "Mic", inputMuted: true }

